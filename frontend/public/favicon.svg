<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100">
  <defs>
    <linearGradient id="grad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#3B82F6;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#9333EA;stop-opacity:1" />
    </linearGradient>
  </defs>
  
  <!-- Background rounded square -->
  <rect width="100" height="100" rx="20" fill="url(#grad)"/>
  
  <!-- Link chain icon -->
  <!-- Left link -->
  <path d="M 35 40 Q 25 40 25 50 Q 25 60 35 60 L 45 60" 
        stroke="white" 
        stroke-width="8" 
        fill="none" 
        stroke-linecap="round"/>
  
  <!-- Right link -->
  <path d="M 55 40 L 65 40 Q 75 40 75 50 Q 75 60 65 60 L 55 60" 
        stroke="white" 
        stroke-width="8" 
        fill="none" 
        stroke-linecap="round"/>
  
  <!-- Middle connecting line -->
  <line x1="42" y1="50" x2="58" y2="50" 
        stroke="white" 
        stroke-width="8" 
        stroke-linecap="round"/>
  
  <!-- Sparkle accent (top right) -->
  <circle cx="75" cy="25" r="3" fill="white" opacity="0.8"/>
  <circle cx="82" cy="30" r="2" fill="white" opacity="0.6"/>
</svg>